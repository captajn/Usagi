name: Usagi
options:
  bundleIdPrefix: org.draken
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  Usagi:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "**/.DS_Store"
          - "project.yml"
          - "README.md"
          - "Usagi.xcodeproj"
          - "scripts"
          - "Tests"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.draken.usagi
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Usagi
        UILaunchScreen:
          UIColorName: AccentColor
  UsagiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Usagi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.draken.usagi.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Usagi.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Usagi"
        BUNDLE_LOADER: "$(TEST_HOST)"
